<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>STOCK</title>

<style>
:root {
  --bg:#0a0a0f; --bg2:#12121a; --bg3:#1a1a26; --card:#16161f;
  --border:#2a2a3a; --text:#f0f0f8; --muted:#6b6b8a;
  --accent:#6c63ff; --accent2:#a78bfa;
  --green:#22c55e; --red:#ef4444; --yellow:#f59e0b;
  --mono:'DM Mono',monospace; --sans:'Pretendard',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}

.header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:16px 20px 12px;
  display:flex;align-items:center;justify-content:space-between;
}
.header-title{font-size:18px;font-weight:700;letter-spacing:-0.5px;}
.header-title span{color:var(--accent2);}
.header-right{display:flex;align-items:center;gap:8px;}
.last-update{font-size:10px;color:var(--muted);font-family:var(--mono);}
.refresh-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--muted);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.refresh-btn:active{transform:scale(0.9);background:var(--accent);color:#fff;}
.refresh-btn.spinning{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.tabs{
  display:flex;background:var(--bg2);
  border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  flex:1;padding:12px 8px;text-align:center;
  font-size:13px;font-weight:500;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all 0.2s;white-space:nowrap;min-width:80px;
}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent2);}

.page{display:none;padding:16px;animation:fadeIn 0.3s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;}
.summary-card.full{grid-column:span 2;}
.summary-card.accent-card{background:linear-gradient(135deg,#1e1b4b,#1a1a26);border-color:#3730a3;}
.card-label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;}
.card-value{font-size:22px;font-weight:700;font-family:var(--mono);letter-spacing:-0.5px;}
.card-value.big{font-size:26px;}
.card-sub{font-size:12px;margin-top:4px;font-family:var(--mono);}
.up{color:var(--green);} .down{color:var(--red);} .neutral{color:var(--muted);}

.chart-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;}
.chart-title{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:14px;letter-spacing:0.3px;}
.chart-wrap{position:relative;height:180px;}

.section-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin:20px 0 10px;}

.stock-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;margin-bottom:10px;
  cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;
}
.stock-card:active{transform:scale(0.98);}
.stock-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.stock-card.up-card::before{background:var(--green);}
.stock-card.down-card::before{background:var(--red);}
.stock-card.neutral-card::before{background:var(--muted);}
.stock-row{display:flex;justify-content:space-between;align-items:flex-start;}
.stock-name{font-size:15px;font-weight:600;margin-bottom:3px;}
.stock-meta{font-size:11px;color:var(--muted);font-family:var(--mono);}
.stock-price{text-align:right;}
.stock-current{font-size:17px;font-weight:700;font-family:var(--mono);}
.stock-change{font-size:12px;font-family:var(--mono);margin-top:2px;}
.stock-detail{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.detail-item{flex:1;}
.detail-label{font-size:10px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.3px;}
.detail-value{font-size:12px;font-family:var(--mono);font-weight:500;}

.week52-bar{margin-top:8px;}
.bar-track{height:4px;background:var(--bg3);border-radius:4px;position:relative;margin:6px 0;}
.bar-fill{height:100%;border-radius:4px;background:var(--accent2);}
.bar-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid var(--accent2);}
.bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:var(--mono);}

.loading-overlay{
  position:fixed;inset:0;background:rgba(10,10,15,0.9);
  backdrop-filter:blur(8px);z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.loading-overlay.hidden{display:none;}
.loader{width:44px;height:44px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent2);animation:spin 0.8s linear infinite;}
.loading-text{font-size:14px;color:var(--muted);}

.error-banner{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
  border-radius:12px;padding:12px 16px;margin-bottom:16px;
  font-size:13px;color:var(--red);display:none;
}

.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.5;}
.empty-text{font-size:14px;line-height:1.6;}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;padding:12px 20px;
  font-size:13px;font-weight:500;white-space:nowrap;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:300;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.toast.show{transform:translateX(-50%) translateY(0);}

.info-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.info-row:last-child{border-bottom:none;}
.info-label{font-size:13px;color:var(--muted);}
.info-value{font-size:13px;font-family:var(--mono);font-weight:500;}
</style>
</head>
<body>

<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loading-text" id="loadingText">구글 시트에서 데이터 불러오는 중...</div>
</div>
<div class="toast" id="toast">불러오기 실패</div>

<div class="header">
  <div class="header-title">MY <span>STOCK</span></div>
  <div class="header-right">
    <div class="last-update" id="lastUpdate"></div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()" title="새로고침">↻</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab(&#39;dashboard&#39;)">대시보드</div>
  <div class="tab" onclick="switchTab(&#39;holdings&#39;)">보유종목</div>
  <div class="tab" onclick="switchTab(&#39;summary&#39;)">요약정보</div>
</div>

<!-- 대시보드 -->
<div class="page active" id="page-dashboard">
  <div class="error-banner" id="errorBanner" style="display: block;">데이터를 불러오지 못했어요. 구글 시트 공유 설정을 확인해주세요.</div>
  <div class="summary-grid">
    <div class="summary-card accent-card full">
      <div class="card-label">총 평가금액</div>
      <div class="card-value big" id="totalValue">―</div>
      <div class="card-sub" id="totalReturn">―</div>
    </div>
    <div class="summary-card">
      <div class="card-label">총 매입금액</div>
      <div class="card-value" id="totalCost">―</div>
    </div>
    <div class="summary-card">
      <div class="card-label">총 손익</div>
      <div class="card-value" id="totalPnl">―</div>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">종목별 비중</div>
    <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">종목별 수익률 (%)</div>
    <div class="chart-wrap"><canvas id="barChart"></canvas></div>
  </div>
</div>

<!-- 보유종목 -->
<div class="page" id="page-holdings">
  <div id="holdingsList"></div>
</div>

<!-- 요약정보 -->
<div class="page" id="page-summary">
  <div id="summaryList"></div>
</div>

<script>
const SHEET_ID = '1orphhrcs4xuhAP2RsXp-QvLtmV_VMQa-gL4ZtNkpb1s';
const SHEET_NAME = 'Stock_MKH';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

let stocks = [];
let pieChartInst = null;
let barChartInst = null;

function fmt(n) {
  if (n == null || isNaN(n) || n === '') return '―';
  return Math.round(Number(n)).toLocaleString('ko-KR');
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '―';
  const sign = Number(n) >= 0 ? '+' : '';
  return sign + Number(n).toFixed(2) + '%';
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  showLoading('구글 시트에서 데이터 불러오는 중...');
  document.getElementById('errorBanner').style.display = 'none';

  try {
    const res = await fetch(URL + '&t=' + Date.now());
    const text = await res.text();
    // Google Visualization API 응답 파싱
    const json = JSON.parse(text.replace(/^\/\*O\*\/google\.visualization\.Query\.setResponse\(/, '').replace(/\);$/, ''));
    const rows = json.table.rows;

    stocks = [];
    for (let i = 0; i < rows.length; i++) {
      const r = rows[i].c;
      const name = r[0]?.v;
      if (!name) continue;

      const code     = r[1]?.v ?? '';
      const market   = r[2]?.v ?? '';
      const qty      = Number(r[3]?.v) || 0;
      const buyPrice = Number(r[4]?.v) || 0;
      const buyAmt   = Number(r[5]?.v) || 0;
      const curPrice = Number(r[6]?.v) || 0;
      const evalAmt  = Number(r[7]?.v) || 0;
      const pnl      = Number(r[8]?.v) || 0;
      const high52   = Number(r[9]?.v) || 0;
      const low52    = Number(r[10]?.v) || 0;
      const returnPct= Number(r[11]?.v) || 0;

      stocks.push({ name, code, market, qty, buyPrice, buyAmt, curPrice, evalAmt, pnl, high52, low52, returnPct });
    }

    renderAll();
    const now = new Date();
    document.getElementById('lastUpdate').textContent =
      `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} 업데이트`;
    showToast('업데이트 완료 ✓');

  } catch(e) {
    const banner = document.getElementById('errorBanner');
    banner.style.display = 'block';
    banner.textContent = '데이터를 불러오지 못했어요. 구글 시트 공유 설정을 확인해주세요.';
    showToast('불러오기 실패');
  }

  hideLoading();
  btn.classList.remove('spinning');
}

function renderAll() {
  renderDashboard();
  renderHoldings();
  renderSummary();
}

function renderDashboard() {
  const totalCost  = stocks.reduce((s,x) => s + x.buyAmt, 0);
  const totalValue = stocks.reduce((s,x) => s + x.evalAmt, 0);
  const totalPnl   = totalValue - totalCost;
  const totalPct   = totalCost > 0 ? (totalPnl / totalCost) * 100 : 0;

  document.getElementById('totalValue').textContent = fmt(totalValue) + '원';
  document.getElementById('totalCost').textContent  = fmt(totalCost) + '원';
  const pnlEl = document.getElementById('totalPnl');
  pnlEl.textContent = (totalPnl >= 0 ? '+' : '') + fmt(totalPnl) + '원';
  pnlEl.className = 'card-value ' + (totalPnl >= 0 ? 'up' : 'down');
  const retEl = document.getElementById('totalReturn');
  retEl.textContent = fmtPct(totalPct) + '  총 수익률';
  retEl.className = 'card-sub ' + (totalPct >= 0 ? 'up' : 'down');

  renderPie(totalValue);
  renderBar();
}

function renderPie(totalValue) {
  const labels=[], values=[], colors=[];
  const palette=['#6c63ff','#a78bfa','#22c55e','#f59e0b','#ef4444','#06b6d4','#ec4899','#84cc16'];
  stocks.forEach((s,i) => {
    labels.push(s.name.length > 8 ? s.name.slice(0,8)+'…' : s.name);
    values.push(s.evalAmt);
    colors.push(palette[i % palette.length]);
  });
  if (pieChartInst) pieChartInst.destroy();
  const ctx = document.getElementById('pieChart').getContext('2d');
  pieChartInst = new Chart(ctx, {
    type:'doughnut',
    data:{ labels, datasets:[{ data:values, backgroundColor:colors, borderWidth:0, hoverOffset:6 }] },
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'65%',
      plugins:{
        legend:{ position:'right', labels:{ color:'#6b6b8a', font:{size:11}, boxWidth:10, padding:8 } },
        tooltip:{ callbacks:{ label:(c) => {
          const pct = ((c.raw / values.reduce((a,b)=>a+b,0))*100).toFixed(1);
          return ` ${fmt(c.raw)}원 (${pct}%)`;
        }}}
      }
    }
  });
}

function renderBar() {
  const labels=[], values=[], colors=[];
  stocks.forEach(s => {
    labels.push(s.name.length > 6 ? s.name.slice(0,6)+'…' : s.name);
    values.push(parseFloat(s.returnPct.toFixed(2)));
    colors.push(s.returnPct >= 0 ? 'rgba(34,197,94,0.8)' : 'rgba(239,68,68,0.8)');
  });
  if (barChartInst) barChartInst.destroy();
  const ctx = document.getElementById('barChart').getContext('2d');
  barChartInst = new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets:[{ data:values, backgroundColor:colors, borderRadius:6, borderSkipped:false }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:c => ` ${fmtPct(c.raw)}` } } },
      scales:{
        x:{ ticks:{ color:'#6b6b8a', font:{size:10} }, grid:{display:false} },
        y:{ ticks:{ color:'#6b6b8a', font:{size:10}, callback:v => v+'%' }, grid:{ color:'rgba(255,255,255,0.05)' } }
      }
    }
  });
}

function renderHoldings() {
  const el = document.getElementById('holdingsList');
  if (!stocks.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">데이터가 없어요<br>새로고침을 눌러주세요</div></div>`;
    return;
  }
  el.innerHTML = stocks.map(s => {
    const cls     = s.pnl > 0 ? 'up' : s.pnl < 0 ? 'down' : 'neutral';
    const cardCls = s.pnl > 0 ? 'up-card' : s.pnl < 0 ? 'down-card' : 'neutral-card';
    const diffPct = s.returnPct;

    let week52Html = '';
    if (s.high52 && s.low52 && s.high52 > s.low52) {
      const range = s.high52 - s.low52;
      const pos = Math.min(Math.max(((s.curPrice - s.low52) / range) * 100, 0), 100);
      week52Html = `
        <div class="week52-bar">
          <div class="bar-labels"><span>${fmt(s.low52)}</span><span>52주 범위</span><span>${fmt(s.high52)}</span></div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pos}%"></div>
            <div class="bar-dot" style="left:${pos}%"></div>
          </div>
        </div>`;
    }

    return `<div class="stock-card ${cardCls}">
      <div class="stock-row">
        <div>
          <div class="stock-name">${s.name}</div>
          <div class="stock-meta">${s.code} · ${s.market} · ${fmt(s.qty)}주</div>
        </div>
        <div class="stock-price">
          <div class="stock-current">${fmt(s.curPrice)}원</div>
          <div class="stock-change ${cls}">${s.pnl >= 0 ? '+' : ''}${fmt(s.curPrice - s.buyPrice)} (${fmtPct(diffPct)})</div>
        </div>
      </div>
      <div class="stock-detail">
        <div class="detail-item">
          <div class="detail-label">매입가</div>
          <div class="detail-value">${fmt(s.buyPrice)}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">평가금액</div>
          <div class="detail-value">${fmt(s.evalAmt)}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">손익</div>
          <div class="detail-value ${cls}">${s.pnl >= 0 ? '+' : ''}${fmt(s.pnl)}</div>
        </div>
      </div>
      ${week52Html}
    </div>`;
  }).join('');
}

function renderSummary() {
  const el = document.getElementById('summaryList');
  if (!stocks.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">데이터가 없어요</div></div>`;
    return;
  }

  const totalCost  = stocks.reduce((s,x) => s + x.buyAmt, 0);
  const totalValue = stocks.reduce((s,x) => s + x.evalAmt, 0);
  const totalPnl   = totalValue - totalCost;
  const totalPct   = totalCost > 0 ? (totalPnl / totalCost) * 100 : 0;
  const best  = [...stocks].sort((a,b) => b.returnPct - a.returnPct)[0];
  const worst = [...stocks].sort((a,b) => a.returnPct - b.returnPct)[0];

  el.innerHTML = `
    <div class="section-title">전체 요약</div>
    <div class="info-card">
      <div class="info-row"><span class="info-label">총 매입금액</span><span class="info-value">${fmt(totalCost)}원</span></div>
      <div class="info-row"><span class="info-label">총 평가금액</span><span class="info-value">${fmt(totalValue)}원</span></div>
      <div class="info-row"><span class="info-label">총 손익</span><span class="info-value ${totalPnl>=0?'up':'down'}">${totalPnl>=0?'+':''}${fmt(totalPnl)}원</span></div>
      <div class="info-row"><span class="info-label">총 수익률</span><span class="info-value ${totalPct>=0?'up':'down'}">${fmtPct(totalPct)}</span></div>
      <div class="info-row"><span class="info-label">보유 종목 수</span><span class="info-value">${stocks.length}개</span></div>
    </div>
    <div class="section-title">수익률 TOP</div>
    <div class="info-card">
      <div class="info-row"><span class="info-label">최고 수익</span><span class="info-value up">${best?.name} ${fmtPct(best?.returnPct)}</span></div>
      <div class="info-row"><span class="info-label">최저 수익</span><span class="info-value down">${worst?.name} ${fmtPct(worst?.returnPct)}</span></div>
    </div>
    <div class="section-title">종목별 상세</div>
    ${stocks.map(s => `
    <div class="info-card">
      <div class="info-row"><span class="info-label" style="font-weight:600;color:var(--text)">${s.name}</span><span class="info-value ${s.returnPct>=0?'up':'down'}">${fmtPct(s.returnPct)}</span></div>
      <div class="info-row"><span class="info-label">현재가</span><span class="info-value">${fmt(s.curPrice)}원</span></div>
      <div class="info-row"><span class="info-label">매입가</span><span class="info-value">${fmt(s.buyPrice)}원</span></div>
      <div class="info-row"><span class="info-label">수량</span><span class="info-value">${fmt(s.qty)}주</span></div>
      <div class="info-row"><span class="info-label">손익</span><span class="info-value ${s.pnl>=0?'up':'down'}">${s.pnl>=0?'+':''}${fmt(s.pnl)}원</span></div>
      <div class="info-row"><span class="info-label">52주 최고</span><span class="info-value">${fmt(s.high52)}원</span></div>
      <div class="info-row"><span class="info-label">52주 최저</span><span class="info-value">${fmt(s.low52)}원</span></div>
    </div>`).join('')}
  `;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['dashboard','holdings','summary'][i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingOverlay').classList.remove('hidden');
}
function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// 시작
loadData();
</script>
